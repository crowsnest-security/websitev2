# Publishes ./public to the gh-pages branch so GitHub Pages can serve it.
# Primary deploy path: merge to main (this workflow). You can also run `npm run deploy` locally if needed.

name: Deploy to gh-pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-gh-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy public/ to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          force_orphan: false
